<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Le Code de la Femme Irrésistible</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- UTMify -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-subids
      async
      defer
    ></script>

    <script>
      window.pixelId = "69a97f4b2fffc4856a1e6b24";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: #ffffff;
            color: #000000;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
            text-align: center;
        }

        h1 {
            font-size: clamp(52px, 9vw, 90px);
            font-weight: 900;
            color: #000000;
            margin-bottom: 20px;
            line-height: 1.05;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 700;
            color: #000000;
            margin-bottom: 56px;
            line-height: 1.3;
        }

        .check-email {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 12px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: #e5e5e5;
            margin: 0 auto 48px;
        }

        .email-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            max-width: 900px;
            margin: 0 auto 48px;
            align-items: end;
        }

        .email-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: #000000;
            cursor: pointer;
            transition: transform 200ms ease;
        }

        .email-item:hover {
            transform: translateY(-4px);
        }

        .email-item img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .email-item span {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
        }

        .divider-bottom {
            width: 100%;
            height: 1px;
            background: #e5e5e5;
            margin: 0 auto 40px;
        }

        .support {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 20px;
        }

        .support-email {
            font-size: 17px;
            color: #000000;
        }

        .support-email strong {
            font-weight: 700;
        }

        .support-email a {
            color: #cd2653;
            text-decoration: none;
        }

        .support-email a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .wrapper { padding: 32px 20px; }
            .email-grid { gap: 20px; }
            .email-item img { width: 70px; height: 70px; }
            .email-item span { font-size: 16px; }
            .support { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Heading -->
        <h1>F&Eacute;LICITATIONS !</h1>
        <p class="subtitle">Pour l&rsquo;acquisition de Le Code de la Femme Irr&eacute;sistible</p>

        <!-- Check Email -->
        <p class="check-email">V&eacute;rifiez votre e-mail et acc&eacute;dez au produit imm&eacute;diatement</p>
        <div class="divider"></div>

        <!-- Email Icons -->
        <div class="email-grid">
            <div class="email-item">
                <img src="imagens/gmail.webp" alt="Gmail">
                <span>Gmail</span>
            </div>
            <div class="email-item">
                <img src="imagens/outlook.webp" alt="Outlook">
                <span>Outlook</span>
            </div>
            <div class="email-item">
                <img src="imagens/yahoo.png" alt="Yahoo">
                <span>Yahoo</span>
            </div>
        </div>

        <!-- Support -->
        <div class="divider-bottom"></div>
        <p class="support">Si vous avez des questions, contactez le support :</p>
        <p class="support-email"><strong>Email:</strong> <a href="mailto:contatoleo@ngvdigital.site">contatoleo@ngvdigital.site</a></p>
    </div>

</body>
</html>
