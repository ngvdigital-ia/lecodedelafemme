        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            background: #ffffff;

        .wrapper {

        }

        h1 {
            font-size: clamp(48px, 8vw, 80px);

            text-decoration: none;
            color: #000000;
            cursor: pointer;

        .email-item:hover {

        }

        .email-item img {

            height: auto;
            object-fit: contain;
        }

        .email-item span {
            font-size: 20px;
            font-weight: 700;
            color: #000000;
        }

        .divider-bottom {
            width: 100%;
            height: 1px;
            background: #e5e5e5;
            margin: 0 auto 40px;
        }

        .support {
            font-size: 20px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 16px;
        }

        .support-email {
            font-size: 16px;
            color: #000000;
        }

        .support-email strong {
            font-weight: 700;
        }

        .support-email a {
            color: #cd2653;
            text-decoration: none;
        }

        .support-email a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
